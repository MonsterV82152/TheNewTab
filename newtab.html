<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base target="_blank">
    <title>New Tab</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        #app {
            position: relative;
            height: 100vh;
            transition: background-color 0.3s ease;
        }

        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            max-width: 1024px;
            margin: 0 auto;
            padding: 2rem;
            overflow: hidden;
        }

        blockquote {
            width: 100%;
        }

        .quote-text {
            font-size: clamp(1.75rem, 4vw, 3rem);
            line-height: 1.5;
            font-weight: 400;
            white-space: pre-wrap;
            word-break: break-word;
            transition: color 0.3s;
        }

        .quote-author {
            margin-top: 1.5rem;
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        /* Skeleton loading */
        .skeleton {
            border-radius: 4px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .skeleton-dark {
            background-color: #3f3f46;
        }

        .skeleton-light {
            background-color: #d4d4d8;
        }

        .sk-row {
            height: 2.5rem;
            margin-bottom: 0.75rem;
        }

        .sk-row-1 {
            width: 100%;
        }

        .sk-row-2 {
            width: 83%;
        }

        .sk-row-3 {
            width: 66%;
        }

        .sk-author {
            height: 1.25rem;
            width: 8rem;
            margin-top: 1.5rem;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .hidden {
            display: none !important;
        }

        /* Settings button */
        #settings-btn {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 10;
            user-select: none;
        }

        #settings-btn svg {
            width: 24px;
            height: 24px;
            display: block;
            transition: transform 0.3s ease;
        }

        #settings-btn.active svg {
            transform: rotate(90deg);
        }

        #settings-btn:hover {
            opacity: 0.8;
        }

        /* Settings panel */
        #settings-panel {
            position: fixed;
            bottom: 3.5rem;
            left: 1rem;
            background: #e4e4e7;
            border-radius: 6px;
            width: 300px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            z-index: 20;
            transform-origin: bottom left;
        }

        .settings-header {
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid #d4d4d8;
            font-size: 0.875rem;
            color: #18181b;
        }

        .settings-body {
            padding: 1rem;
        }

        .settings-section {
            margin-bottom: 1rem;
        }

        .settings-section:last-child {
            margin-bottom: 0;
        }

        .settings-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.35rem;
            color: #18181b;
        }

        /* Color swatches */
        .color-swatches {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .color-swatch {
            cursor: pointer;
            border: 2px solid transparent;
            padding: 2px;
            border-radius: 4px;
            transition: border-color 0.15s;
        }

        .color-swatch:hover {
            border-color: #a1a1aa;
        }

        .color-swatch.active {
            border-color: #71717a;
        }

        .color-swatch-inner {
            width: 16px;
            height: 16px;
            border-radius: 2px;
            display: block;
        }

        /* Custom color picker */
        .color-custom {
            cursor: pointer;
            border: 2px solid transparent;
            padding: 2px;
            border-radius: 4px;
            transition: border-color 0.15s;
            position: relative;
        }

        .color-custom:hover {
            border-color: #a1a1aa;
        }

        .color-custom.active {
            border-color: #71717a;
        }

        .color-custom-inner {
            width: 16px;
            height: 16px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: bold;
            color: #71717a;
            border: 1px dashed #a1a1aa;
        }

        .color-custom-input {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Font selects */
        select {
            width: 100%;
            padding: 0.375rem 0.5rem;
            background: #f4f4f5;
            border: none;
            border-radius: 4px;
            font-size: 0.875rem;
            color: #18181b;
            cursor: pointer;
            outline: none;
            appearance: auto;
        }

        select:focus {
            box-shadow: 0 0 0 2px #71717a;
        }

        /* Credit */
        #credit {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            font-size: 8px;
            font-family: monospace;
            transition: color 0.3s;
        }

        #credit a {
            color: inherit;
            text-decoration: none;
        }

        #credit a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="content">
            <blockquote>
                <!-- Quote loading skeleton -->
                <div id="quote-skeleton" class="hidden">
                    <div class="skeleton sk-row sk-row-1"></div>
                    <div class="skeleton sk-row sk-row-2"></div>
                    <div class="skeleton sk-row sk-row-3"></div>
                </div>
                <!-- Quote text -->
                <h1 id="quote-text" class="quote-text"></h1>

                <!-- Author loading skeleton -->
                <div id="author-skeleton" class="hidden">
                    <div class="skeleton sk-author"></div>
                </div>
                <!-- Author -->
                <h3 id="quote-author" class="quote-author"></h3>
            </blockquote>
        </div>
    </div>

    <!-- Settings button -->
    <div id="settings-btn" tabindex="0" role="button" aria-label="Toggle settings">
        <svg fill="currentColor" width="24px" height="24px" viewBox="0 -8 72 72" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M56.74,20.89l-1-2.31c3.33-7.53,3.11-7.76,2.46-8.41L54,6l-.42-.35h-.49c-.26,0-1,0-7.51,2.93l-2.38-1C40.09,0,39.77,0,38.87,0h-6c-.9,0-1.25,0-4.1,7.66l-2.37,1C22,6.78,19.45,5.84,18.75,5.84l-.56,0L13.62,10.3c-.7.65-.94.88,2.58,8.3l-1,2.3c-7.79,3-7.79,3.3-7.79,4.23v5.89c0,.92,0,1.25,7.82,4l1,2.29c-3.33,7.53-3.11,7.76-2.46,8.41L18,50l.42.37h.5c.25,0,1,0,7.5-2.92l2.38,1C31.9,56,32.21,56,33.12,56h6c.92,0,1.25,0,4.11-7.66l2.39-1c4.37,1.85,6.9,2.79,7.61,2.79l.57,0,4.62-4.52c.66-.66.89-.89-2.62-8.28l1-2.3c7.81-3,7.81-3.33,7.81-4.23V24.93C64.57,24,64.57,23.68,56.74,20.89ZM36,37.8A9.8,9.8,0,1,1,46,28,9.91,9.91,0,0,1,36,37.8Z" />
        </svg>
    </div>

    <!-- Settings panel -->
    <div id="settings-panel" class="hidden" role="dialog" aria-label="Settings">
        <div class="settings-header">Settings</div>
        <div class="settings-body">
            <div class="settings-section">
                <label class="settings-label">Background Color</label>
                <div class="color-swatches" id="color-swatches"></div>
            </div>
            <div class="settings-section">
                <label class="settings-label">Quote font</label>
                <select id="quote-font-select"></select>
            </div>
            <div class="settings-section">
                <label class="settings-label">Author font</label>
                <select id="author-font-select"></select>
            </div>
        </div>
    </div>

    <!-- Credit -->
    <div id="credit">
        Made with &#10084;&#65039; by <a href="https://github.com/monsterv82152">monsterv82152</a>
    </div>

    <script src="newtab.js"></script>
</body>

</html>
